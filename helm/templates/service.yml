---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Chart.Name }}
spec:
  ports:
    - name: https
      port: {{ .Values.containerPort }}
      targetPort: {{ .Chart.Name }}
      protocol: TCP
    - name: http
      port: 80
      targetPort: 80
      protocol: TCP
  selector:
    app: {{ .Chart.Name }}
  type: {{ .Values.type }}
