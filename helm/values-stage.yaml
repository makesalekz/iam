image:
  # image config
  repository:
  tag:
  pullPolicy: IfNotPresent

fullnameOverride: iam
nameOverride: iam
namespaceOverride: stage-backend
configmap:
  private:
    enabled: false
  data:
    SERVICE_NAME: "iam"
    CONSUL_ADDRESS: "http://10.2.5.6:8500"
    VAULT_ADDRESS: "http://10.2.4.5:8200"

server:
  replicaCount: 1
  command: ["./iam", "-conf", "./config.stage.yaml"]
  podSecurityContext: {}
  securityContext: {}

  resources:
    limits:
      cpu: 1
      memory: 1Gi
    requests:
      cpu: 200m
      memory: 128Mi

  service:
    type: ClusterIP
    port: 80
    targetPort: 8000

  vaultSecret:
    enabled: true
    project: stage-calendaria

  nodeSelector: {}
  tolerations: []
  affinity: {}

migrateJob:
  enabled: true
  command: ["/atlas", "migrate", "apply", "--url", "$(DB_URL)", "--allow-dirty"]
