syntax = "proto3";

package iam.v1;

import "api/utils/v1/models.proto";
import "api/iam/v1/models.proto";

option go_package = "gitlab.calendaria.team/services/iam/api/iam/v1;iam_v1";
option java_multiple_files = true;
option java_package = "iam.v1";

service Credentials {
  rpc AuthByGoogle(AuthByGoogleRequest) returns (utils.v1.EmptyReply);
  rpc GetOwnSync(utils.v1.EmptyRequest) returns (CredentialsReply);
  rpc DeleteSync(CredentialsRequest) returns (utils.v1.EmptyReply);
}

message AuthByGoogleRequest {
  string auth_code = 1;
}

message CredentialsRequest {
  int64 syncId = 1;
}

message CredentialsReply {
  UserCredentials sync = 1;
}
