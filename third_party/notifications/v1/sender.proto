syntax = "proto3";

package notifications.v1;

import "google/api/annotations.proto";

option go_package = "gitlab.calendaria.team/services/notifications/api/notifications/v1;notifications_v1";
option java_multiple_files = true;
option java_package = "notifications.v1";

service Sender {
	rpc CreateFcmDevice (FcmDeviceRequest) returns (EmptyReply) {
		option (google.api.http) = {
			post: "/v1/notifications/fcm/devices"
			body: "*"
		};
	};
	rpc DeleteFcmDevice (FcmDeviceRequest) returns (EmptyReply) {
		option (google.api.http) = {
			delete: "/v1/notifications/fcm/devices"
		};
	};
	rpc PersonalSmsSender (PersonalSmsSenderRequest) returns (EmptyReply);
}

message EmptyReply {}

message FcmDeviceRequest {
	string token = 1;
}

message PersonalSmsSenderRequest {
	string phone = 1;
	string message = 2;
}
