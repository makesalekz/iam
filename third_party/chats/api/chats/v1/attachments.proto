syntax = "proto3";

package api.chats.v1;

import "google/api/annotations.proto";
import "chats/v1/models.proto";

option go_package = "chats/api/chats/v1;chats_v1";
option java_multiple_files = true;
option java_package = "api.attachments.v1";

service Attachments {
  rpc DeleteAttachment (DeleteAttachmentRequest) returns (DeleteAttachmentReply) {
    option (google.api.http) = {
      delete: "/v1/chats/attachments/{attachmentId}"
    };
  };
  rpc ListAttachments (ListAttachmentsRequest) returns (ListAttachmentsReply) {
    option (google.api.http) = {
      post: "/v1/chats/{chatId}/attachments/list"
      body: "*"
    };
  };
}

message DeleteAttachmentRequest {
  int64 attachmentId = 1;
}
message DeleteAttachmentReply {}

message ListAttachmentsRequest {
  int64 chatId = 1;
  string type = 2;
  PaginateRequest paginate = 3;
}
message ListAttachmentsReply {
  repeated Attachment attachments = 1;
  repeated Member members = 2;
  PaginateReply paginate = 3;
}
