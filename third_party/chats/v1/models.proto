syntax = "proto3";

package chats.v1;

import "errors/errors.proto";
import "iam/v1/models.proto";
import "contacts/v1/models.proto";
import "media/v1/media.proto";
import "events/v1/models.proto";

option go_package = "gitlab.calendaria.team/services/chats/api/chats/v1;chats_v1";
option java_package = "chats.v1";

//---------------------------------- Models ----------------------------------
// request
message ChatRequest {
  int64 chatId = 1;
}

// empty
message EmptyReply {}

// dto
message MessageAdditions {
  string type = 1;
  string value = 2;
  int32 start = 3;
  int32 end = 4;
}

message LocationDto {
  double latitude = 1;
  double longitude = 2;
  string label = 3;
}

// reply
message Attachment {
  int64 id = 1;
  string type = 2;

  media.v1.Media media = 3;
}

message Location {
  int64 id = 1;
  double latitude = 2;
  double longitude = 3;
  string label = 4;

  optional Member member = 5;
}

message Link {
  int64 id = 1;
  int64 messageId = 2;
  string url = 3;
  int64 ownerId = 6;
}

message Chat {
  int64 id = 1;
  string type = 2;
  optional string title = 3;
  optional string description = 4;
  optional string cover = 5;
  int32 membersCount = 6;
  string createdAt = 7;
  string updatedAt = 8;
  optional int64 companionId = 9; // companion of the direct chat OR owner of other chats

  Membership membership = 10;
  optional Message lastMessage = 11;
  optional events.v1.Event event = 12;
}

message Member {
  int64 id = 1;
  string status = 2;
  string role = 3;

  optional iam.v1.UserShort user = 4;
}

message Membership {
  int64 chatId = 1;
  string status = 2;
  string role = 3;
  int32 unreadCount = 4;
  bool isPinned = 5;
  bool isMuted = 6;
  optional string mutedTill = 7;
  optional string archivedAt = 8;
  optional int64 firstMessageId = 9;
  optional int64 lastReadId = 10;
  bool autoSave = 11;
}

message Message {
  int64 id = 1;
  optional string cid = 2;
  string type = 3; // REGULAR/SYSTEM
  bool pinned = 4;
  string createdAt = 5;
  string updatedAt = 6;
  int64 userId = 7;

  optional MessageContent content = 8;
  optional MessageAction action = 9;
}

message MessageContent {
  optional string text = 1;

  optional Message replyTo = 2;
  optional Location location = 3;
  optional events.v1.Event event = 4;
  optional contacts.v1.Contact contact = 5;

  repeated Attachment attachments = 6;
  repeated MessageAdditions additions = 7;
}

message MessageAction {
  string type = 1; // System message actions/type
  optional int64 targetUserId = 2;
  optional string changedFrom = 3;
  optional string changedTo = 4;

  optional Message message = 5;
}

//---------------------------------- Pagination ----------------------------------
message PaginateRequest {
  int32 limit = 1;
  int64 fromId = 2;
  int64 toId = 3;
  int64 aroundId = 4;
  string fromDate = 5;
  string toDate = 6;
  string aroundDate = 7;
  string fromLabel = 8;
  bool descending = 9;
}

message PaginateReply {
  optional int32 total = 1;
  optional int64 fromId = 2;
  optional int64 toId = 3;
  optional string fromDate = 4;
  optional string toDate = 5;
  optional string fromLabel = 6;
}

//---------------------------------- Errors ----------------------------------
enum ErrorReason {
  // Set default error code.
  option (errors.default_code) = 500;

  // Set the error code separately for an enumeration.
  INTERNAL = 0;
  GRPC_CONNECTION = 1;
  SERVICE_FAILED = 2;
  DATABASE_QUERY = 3;
  FORBIDDEN = 4 [(errors.code) = 403];

  UNAUTHORIZED = 10 [(errors.code) = 401];

  INVALID_REQUEST = 20 [(errors.code) = 400];
  NOT_FOUND = 21 [(errors.code) = 404];
}
