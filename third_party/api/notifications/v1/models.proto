syntax = "proto3";

package notifications.v1;

option go_package = "gitlab.calendaria.team/services/notifications/api/notifications/v1;notifications_v1";
option java_multiple_files = true;
option java_package = "notifications.v1";

message Notification {
	int64 id = 1;
	string type = 2;
	string title = 3;
	string text = 4;
	int64 eventId = 5;
	int64 contactId = 6;
	string createdAt = 7;
}

message NotificationDto {
	int64 userId = 1;
	string title = 2;
	string text = 3;
	int64 eventId = 4;
	int64 contactId = 5;
}
