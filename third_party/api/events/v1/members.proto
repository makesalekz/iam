syntax = "proto3";

package events.v1;

import "api/events/v1/models.proto";
import "api/utils/v1/models.proto";

option go_package = "github.com/makesalekz/events/api/events/v1;events_v1";
option java_multiple_files = true;
option java_package = "events.v1";

service Members {
  rpc InviteMembers(InviteMembersRequest) returns (InviteMembersReply);
  rpc UpdateMemberStatus(UpdateMemberStatusRequest)
      returns (utils.v1.EmptyReply);
  rpc UpdateMemberRemind(UpdateMemberRemindRequest)
      returns (utils.v1.EmptyReply);
  rpc UpdateMemberRole(UpdateMemberRoleRequest) returns (utils.v1.EmptyReply);
  rpc KickMember(KickMemberRequest) returns (utils.v1.EmptyReply);
  rpc GetMember(GetMemberRequest) returns (GetMemberReply);
  rpc ListMembers(ListMembersRequest) returns (ListMembersReply);
  rpc GetMemberHistory(GetMemberHistoryRequest) returns (GetMemberHistoryReply);
}

message InviteMembersRequest {
  int64 eventId = 1;
  repeated int64 members = 2;
}

message InviteMembersReply {
  bool status = 1;
  repeated int64 privateUsers = 2;
}

message UpdateMemberStatusRequest {
  int64 eventId = 1;
  string status = 2;
}

message UpdateMemberRemindRequest {
  int64 eventId = 1;
  int32 remind = 2;
}

message UpdateMemberRoleRequest {
  int64 eventId = 1;
  int64 userId = 2;
  string role = 3;
}

message KickMemberRequest {
  int64 eventId = 1;
  int64 userId = 2;
}

message GetMemberRequest {
  int64 eventId = 1;
  int64 userId = 2;
}

message GetMemberReply {
  Member member = 1;
}

message ListMembersRequest {
  int64 eventId = 1;
  repeated string statuses = 2;
  utils.v1.PaginateRequest paginate = 3;
}

message ListMembersReply {
  repeated Member members = 1;
  utils.v1.PaginateReply paginate = 2;
}

message GetMemberHistoryRequest {
  int64 eventId = 1;
  utils.v1.PaginateRequest paginate = 2;
}

message GetMemberHistoryReply {
  repeated MemberHistory history = 1;
  utils.v1.PaginateReply paginate = 3;
}
