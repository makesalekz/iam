syntax = "proto3";

package events.v1;

import "api/media/v1/models.proto";

option go_package = "gitlab.calendaria.team/services/events/api/events/v1;events_v1";
option java_package = "events.v1";

//---------------------------------- Models ----------------------------------
// request/reply
message CalendarRequest {
  int64 calendarId = 1;
}

message CalendarReply {
  Calendar calendar = 1;
}

message EventRequest {
  int64 eventId = 1;
}

message EventReply {
  Event event = 1;
  repeated EventSchedule schedules = 2;
}

message InviteLinkRequest {
  int64 eventId = 1;
  int64 linkId = 2;
}

message InviteLinkReply {
  InviteLink link = 1;
}

// dto
message CalendarDto {
  string title = 1;
  string color = 2;
  string description = 3;
}

message EventDto {
  int64 calendarId = 14;
  string title = 2;
  string description = 3;
  optional int64 mediaId = 4;
  string startDateTime = 5;
  string endDateTime = 6;
  bool isAllDay = 7;
  int32 noticeBefore = 8;
  string type = 9;
  string recurrenceRule = 10;
  bool isChatOn = 11;
  bool isToPublish = 13;

  optional LocationDto location = 12;
}

message LocationDto {
  optional string address = 1;
  optional string information = 4;
  float latitude = 2;
  float longitude = 3;
}

message LinkDto {
  string title = 1;
  string url = 2;
}

// reply
message Calendar {
  int64 id = 1;
  string title = 2;
  string description = 3;
  string color = 4;
  bool isPrimary = 5;
  string provider = 7;

  int64 ownerId = 6;
}

message ExternalCalendar {
  string externalId = 1;
  string title = 2;
  string description = 3;
  string color = 4;
  bool isPrimary = 5;
  bool isConnected = 6;
}

message Event {
  int64 id = 1;
  string title = 2;
  string description = 3;
  optional string coverUrl = 5;
  string startDateTime = 6;
  string endDateTime = 7;
  bool isAllDay = 8;
  int32 noticeBefore = 9;
  optional int64 chatId = 10;
  optional int64 locationId = 11;
  string type = 12;
  optional string recurrenceRule = 13;
  repeated string avatars = 14;
  int32 membersCount = 15;
  int64 ownerId = 16;
  string publishedAt = 20;

  optional Membership membership = 18;
  optional LocationDto location = 19;
}

message EventRecurrence {
  int64 eventId = 1;
  string startDateTime = 2;
  string endDateTime = 3;
}

message EventSchedule {
  int64 eventId = 1;
  string startDateTime = 2;
  string endDateTime = 3;
  optional string recurrenceRule = 4;
}

message AttachmentShort {
  int64 id = 1;
  int64 mediaId = 2;
}

message Attachment {
  int64 id = 1;
  string type = 2;
  int64 eventId = 3;

  media.v1.Media media = 4;
}

message Link {
  int64 id = 1;
  string title = 2;
  string url = 3;
  int64 ownerId = 4;
  int64 eventId = 5;
}

message InviteLink {
  int64 id = 1;
  int64 eventId = 2;
  optional int64 userId = 3;
  string uuid = 4;
}

message Member {
  int64 id = 1;
  int64 eventId = 2;
  int64 userId = 3;
  string status = 4;
  string role = 5;
  int32 remind = 6;
  optional string remindAt = 7;
}

message Membership {
  int64 id = 1;
  string status = 2;
  string role = 3;
  optional int32 remind = 4;
  optional string remindAt = 5;
}

message MemberHistory {
  int64 id = 1;
  int64 userId = 2;
  optional string statusFrom = 3;
  string statusTo = 4;
  string createdAt = 5;
}

message EventSlot {
  string startDateTime = 1;
  string endDateTime = 2;
  SlotType slotType = 3;
  repeated Event events = 4;
}

enum SlotType {
  EmptySlotType = 0;
  EventSlotType = 1;

  AnySlotType = 100;
}