syntax = "proto3";

package events.v1;

import "api/events/v1/models.proto";
import "api/utils/v1/models.proto";

option go_package = "gitlab.calendaria.team/services/events/api/events/v1;events_v1";
option java_multiple_files = true;
option java_package = "events.v1";

service Links {
  rpc CreateLinks(CreateLinksRequest) returns (CreateLinksReply);
  rpc DeleteLinks(DeleteLinksRequest) returns (utils.v1.EmptyReply);
  rpc ListLinks(ListLinksRequest) returns (ListLinksReply);
}

message CreateLinksRequest {
  int64 eventId = 1;
  repeated LinkDto links = 2;
}

message CreateLinksReply {
  repeated Link links = 1;
}

message DeleteLinksRequest {
  int64 eventId = 1;
  int64 linkId = 2;
}

message ListLinksRequest {
  int64 eventId = 1;
  utils.v1.PaginateRequest paginate = 2;
}

message ListLinksReply {
  repeated Link links = 1;
  utils.v1.PaginateReply paginate = 3;
}
