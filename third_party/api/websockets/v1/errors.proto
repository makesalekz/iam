syntax = "proto3";

package websockets.v1;

import "errors/errors.proto";

option go_package = "gitlab.calendaria.team/services/websockets/api/websockets/v1;websockets_v1";
option java_multiple_files = true;
option java_package = "websockets.v1";

enum ErrorReason {
  // Set default error code.
  option (errors.default_code) = 500;

  // Set the error code separately for an enumeration.
  INTERNAL = 0;
  GRPC_CONNECTION = 1;
  SERVICE_FAILED = 2;
  DATABASE_QUERY = 3;
  FORBIDDEN = 4 [(errors.code) = 403];
  EMPTY_ACTOR_ID = 5;

  INVALID_REQUEST = 10 [(errors.code) = 400];
  UNAUTHORIZED = 11 [(errors.code) = 401];
  NOT_FOUND = 14 [(errors.code) = 404];
}