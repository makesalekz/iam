syntax = "proto3";

package api.contacts.v1;

import "google/api/annotations.proto";
import "contacts/v1/models.proto";

option go_package = "contacts/api/contacts/v1;contacts_v1";
option java_multiple_files = true;
option java_package = "api.contacts.v1";

service Contacts {
	rpc CreateContacts (CreateContactsRequest) returns (EmptyReply) {
		option (google.api.http) = {
			post: "/v1/contacts"
			body: "*"
		};
	};
	rpc UpdateContact (UpdateContactRequest) returns (EmptyReply) {
		option (google.api.http) = {
			put: "/v1/contacts/{contactId}"
			body: "*"
		};
	};
	rpc DeleteContact (DeleteContactRequest) returns (EmptyReply) {
		option (google.api.http) = {
			delete: "/v1/contacts/{contactId}"
		};
	};
	rpc GetContact (GetContactRequest) returns (GetContactReply);
	rpc GetContacts (GetContactsRequest) returns (GetContactsReply);

  // ListContacts  
  // Request: pagination request and query
  rpc ListContacts (ListContactsRequest) returns (ListContactsReply) {
    option (google.api.http) = {
      post: "/v1/contacts/list"
			body: "*"
    };
  };

  // GetLabels  
  // Request: userId of whom we need to get all labels  
  // Returns: list of labels which user has in our contacts, including the empty ones
  rpc GetLabelsByUserId (GetLabelsByUserIdRequest) returns (GetLabelsByUserIdResponse) {
    option (google.api.http) = {
      post: "/v1/contacts/user/labels"
			body: "*"
    };
  };
}

message CreateContactsRequest {
  repeated ContactDto contacts = 1;
}

message ContactDto {
  string phone = 1;
  string email = 2;
  string label = 3;
}

message UpdateContactRequest {
  int64 contactId = 1;
  string label = 2;
}

message DeleteContactRequest {
  int64 contactId = 1;
}

message GetContactRequest {
  int64 contactId = 1;
}

message GetContactReply {
  Contact contact = 1;
}

message GetContactsRequest {
  repeated int64 ids = 1;
}

message GetContactsReply {
  repeated Contact contacts = 1;
}

message ListContactsRequest {
  // A general string which will be used for search, similar to DB %LIKE%
  optional string query = 5;
  PaginateRequest paginate = 7;
}

message ListContactsReply {
  repeated Contact contacts = 1;
  PaginateReply paginate = 2;
}

message GetLabelsByUserIdRequest {
  int64 userId = 1;
}

message GetLabelsByUserIdResponse {
  repeated string labels = 1;
}