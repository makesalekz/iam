syntax = "proto3";

package api.media.v1;

import "google/api/annotations.proto";
import "errors/errors.proto";
import "google/api/httpbody.proto";

option go_package = "media/api/media/v1;media_v1";
option java_multiple_files = true;
option java_package = "api.media.v1";

service MediaService {
  rpc UploadMedia (UploadMediaRequest) returns (MediaReply){
    option (google.api.http) = {
      post: "/v1/media"
      body: "*"
    };
  };
  rpc GetMedia (GetMediaRequest) returns (MediaReply);
  rpc GetMediaList (GetMediaListRequest) returns (MediaListReply);
}

message Media {
  int64 id = 1;
  int64 ownerId = 2;
  string url = 3;
  string fileName = 4;
  string extension = 5;
  int32 size = 6;              // in bytes
  optional int32 width = 7;    // in pixels
  optional int32 height = 8;   // in pixels
  optional float duration = 9; // in seconds
}

message UploadMediaRequest {
  google.api.HttpBody content = 1;
  string fileName = 2; // header: X-File-Name
}

message MediaReply {
  Media media = 1;
}

message GetMediaRequest {
  int64 mediaId = 1;
}

message GetMediaListRequest {
  repeated int64 mediaIds = 1;
  bool ownOnly = 2;
}

message MediaListReply {
  repeated Media media = 1;
}

enum ErrorReason {
  // Set default error code.
  option (errors.default_code) = 500;

  // Set the error code separately for an enumeration.
  INTERNAL = 0;
  GRPC_CONNECTION = 1;
  SERVICE_FAILED = 2;
  DATABASE_QUERY = 3;

  UNAUTHORIZED = 10 [(errors.code) = 401];
  INVALID_CONTENT_TYPE = 11 [(errors.code) = 400];

  S3UPLOAD_FAILED = 20;
}