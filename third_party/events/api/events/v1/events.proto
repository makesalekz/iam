syntax = "proto3";

package api.events.v1;

import "google/api/annotations.proto";
import "events/v1/models.proto";

option go_package = "events/api/events/v1;events_v1";
option java_multiple_files = true;
option java_package = "api.events.v1";

service Events {
  rpc CreateEvent (CreateEventsRequest) returns (CreateEventsReply) {
    option (google.api.http) = {
      post: "/v1/events"
      body: "*"
    };
  };
  rpc UpdateEvent (UpdateEventsRequest) returns (UpdateEventsReply) {
    option (google.api.http) = {
      put: "/v1/events/{eventId}"
      body: "*"
    };
  };
  rpc DeleteEvent (DeleteEventsRequest) returns (DeleteEventsReply) {
    option (google.api.http) = {
      delete: "/v1/events/{eventId}"
    };
  };
  rpc DeleteEventCover (DeleteEventsRequest) returns (DeleteEventsReply) {
    option (google.api.http) = {
      delete: "/v1/events/{eventId}/cover"
    };
  };
  rpc DeleteEventLocation (DeleteEventsRequest) returns (DeleteEventsReply) {
    option (google.api.http) = {
      delete: "/v1/events/{eventId}/location"
    };
  };
  rpc GetEvent (GetEventRequest) returns (GetEventReply) {
    option (google.api.http) = {
      get: "/v1/events/{eventId}"
    };
  };
  rpc ListEvents (ListEventsRequest) returns (ListEventsReply) {
    option (google.api.http) = {
      post: "/v1/events/list"
      body: "*"
    };
  };
  rpc GetEvents (GetEventsRequest) returns (GetEventsReply);
}

message CreateEventsRequest {
  EventDto event = 1;
}
message CreateEventsReply {
  Event event = 1;
}

message UpdateEventsRequest {
  int64 eventId = 1;
  EventDto event = 2;
}
message UpdateEventsReply {
  Event event = 1;
}

message DeleteEventsRequest {
  int64 eventId = 1;
}
message DeleteEventsReply {}

message GetEventRequest {
  int64 eventId = 1;
}
message GetEventReply {
  Event event = 1;
}

message ListEventsRequest {
  repeated string memberStatuses = 1;
  repeated string eventTypes = 2;
  optional bool isAllDay = 3;
  optional bool isSetRemind = 4;
  optional string fromDateTime = 5;
  optional string toDateTime = 6;

  PaginateRequest paginate = 7;
}
message ListEventsReply {
  repeated Event events = 1;
  PaginateReply paginate = 2;
}

message GetEventsRequest {
  repeated int64 eventsIds = 1;
}
message GetEventsReply {
  repeated Event events = 1;
}
