syntax = "proto3";

package api.events.v1;

import "google/api/annotations.proto";
import "events/v1/models.proto";

option go_package = "events/api/events/v1;events_v1";
option java_multiple_files = true;
option java_package = "api.events.v1";

service Attachments {
  rpc CreateAttachment (CreateAttachmentsRequest) returns (EmptyReply) {
    option (google.api.http) = {
      post: "/v1/events/{eventId}/attachments"
      body: "*"
    };
  };
  rpc DeleteAttachment (DeleteAttachmentRequest) returns (EmptyReply) {
    option (google.api.http) = {
      delete: "/v1/events/{eventId}/attachments/{attachmentId}"
    };
  };
  rpc ListAttachments (ListAttachmentsRequest) returns (ListAttachmentsReply) {
    option (google.api.http) = {
      post: "/v1/events/{eventId}/attachments/list"
      body: "*"
    };
  };
}

message CreateAttachmentsRequest {
  int64 eventId = 1;
  repeated int64 mediaIds = 2;
}

message DeleteAttachmentRequest {
  int64 eventId = 1;
  int64 attachmentId = 2;
}

message ListAttachmentsRequest {
  int64 eventId = 1;
  PaginateRequest paginate = 2;
}
message ListAttachmentsReply {
  repeated Attachment attachments = 1;
  repeated MemberShort members = 2;

  PaginateReply paginate = 3;
}
