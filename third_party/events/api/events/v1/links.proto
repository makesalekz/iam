syntax = "proto3";

package api.events.v1;

import "iam/api/iam/v1/users.proto";
import "google/api/annotations.proto";
import "events/v1/models.proto";

option go_package = "events/api/events/v1;events_v1";
option java_multiple_files = true;
option java_package = "api.events.v1";

service Links {
  rpc CreateLinks (CreateLinksRequest) returns (CreateLinksReply) {
    option (google.api.http) = {
      post: "/v1/events/{eventId}/links"
      body: "*"
    };
  };
  rpc DeleteLinks (DeleteLinksRequest) returns (DeleteLinksReply) {
    option (google.api.http) = {
      delete: "/v1/events/{eventId}/links/{linkId}"
    };
  };
  rpc ListLinks (ListLinksRequest) returns (ListLinksReply) {
    option (google.api.http) = {
      post: "/v1/events/{eventId}/links/list"
      body: "*"
    };
  };
}

message CreateLinksRequest {
  int64 eventId = 1;
  repeated LinkDto links = 2;
}
message CreateLinksReply {
  repeated Link links = 1;
}

message DeleteLinksRequest {
  int64 eventId = 1;
  int64 linkId = 2;
}
message DeleteLinksReply {}

message ListLinksRequest {
  int64 eventId = 1;
  PaginateRequest paginate = 2;
}
message ListLinksReply {
  repeated Link links = 1;
  repeated api.iam.v1.UserShort users = 2;
  PaginateReply paginate = 3;
}
