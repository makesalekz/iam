syntax = "proto3";

package api.tenants.v1;

import "google/api/annotations.proto";
import "tenants/v1/models.proto";

option go_package = "tenants/api/tenants/v1;tenants_v1";
option java_multiple_files = true;
option java_package = "api.tenants.v1";

service Members {
	rpc CreateMembers (CreateMembersRequest) returns (EmptyReply) {
		option (google.api.http) = {
			post: "/v1/tenants/{tenantId}/members"
			body: "*"
		};
	};
	rpc DeleteMember (DeleteMemberRequest) returns (EmptyReply) {
		option (google.api.http) = {
			delete: "/v1/tenants/{tenantId}/members/{memberId}"
		};
	};
	rpc GetMember (GetMemberRequest) returns (GetMemberReply);
	rpc ListMembers (ListMembersRequest) returns (ListMembersReply) {
		option (google.api.http) = {
			post: "/v1/tenants/{tenantId}/members/list"
			body: "*"
		};
	};
}

message CreateMembersRequest {
	int64 tenantId = 1;
	repeated int64 usersIds = 2;
}

message DeleteMemberRequest {
	int64 tenantId = 1;
	string memberId = 2;
}

message GetMemberRequest {
	int64 tenantId = 1;
	int64 userId = 2;
}

message GetMemberReply {
	string member = 1;
	repeated string groups = 2;
}

message ListMembersRequest {
	int64 tenantId = 1;
	PaginateRequest paginate = 2;
}

message ListMembersReply {
	repeated Member members = 1;
	PaginateReply paginate = 2;
}