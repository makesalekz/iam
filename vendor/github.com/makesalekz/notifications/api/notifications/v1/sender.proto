syntax = "proto3";

package notifications.v1;

import "api/utils/v1/models.proto";
import "validate/validate.proto";

option go_package = "github.com/makesalekz/notifications/api/notifications/v1;notifications_v1";
option java_multiple_files = true;
option java_package = "notifications.v1";

service Sender {
  rpc CreateFcmDevice(FcmDataRequest) returns (utils.v1.EmptyReply);
  rpc DeleteFcmDevice(FcmDeviceRequest) returns (utils.v1.EmptyReply);
  rpc PersonalSmsSender(PersonalSmsSenderRequest) returns (utils.v1.EmptyReply);
  rpc EmailSender(EmailSenderRequest) returns (utils.v1.EmptyReply);
}

message FcmDeviceRequest {
  string token = 2;
}

message FcmDataRequest {
  string language = 1;
  string token = 2;
  optional string oldToken = 3;
}

message PersonalSmsSenderRequest {
  string phone = 1;
  string message = 2;
  string sender = 3;
}

message EmailSenderRequest {
  optional string language = 1 [(validate.rules).string = {in: ["en", "ru", "kk"]}];
  string type = 2 [(validate.rules).string = {in: ["invite", "confirm_email"]}];
  repeated string emails = 3 [(validate.rules).repeated = {items: {string: {email: true}}}];
  map<string, string> data = 4;
}