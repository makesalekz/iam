syntax = "proto3";

package events.v1;

import "api/events/v1/models.proto";
import "api/utils/v1/models.proto";

option go_package = "gitlab.calendaria.team/services/events/api/events/v1;events_v1";
option java_multiple_files = true;
option java_package = "events.v1";

service Attachments {
  rpc CreateAttachments(CreateAttachmentsRequest) returns (AttachmentsReply);
  rpc DeleteAttachment(DeleteAttachmentRequest) returns (utils.v1.EmptyReply);
  rpc ListAttachments(ListAttachmentsRequest) returns (ListAttachmentsReply);
}

message CreateAttachmentsRequest {
  int64 eventId = 1;
  repeated int64 mediaIds = 2;
}

message AttachmentsReply {
  repeated AttachmentShort attachments = 1;
}

message DeleteAttachmentRequest {
  int64 eventId = 1;
  int64 attachmentId = 2;
}

message ListAttachmentsRequest {
  int64 eventId = 1;
  repeated string types = 2;
  utils.v1.PaginateRequest paginate = 3;
}

message ListAttachmentsReply {
  repeated Attachment attachments = 1;
  repeated Member members = 2;
}
