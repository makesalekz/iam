syntax = "proto3";

package events.v1;

import "api/events/v1/models.proto";
import "api/iam/v1/models.proto";
import "api/utils/v1/models.proto";

option go_package = "gitlab.calendaria.team/services/events/api/events/v1;events_v1";
option java_multiple_files = true;
option java_package = "events.v1";

service InviteLinks {
  // Create a new invite link
  rpc CreateInviteLink(CreateInviteLinkRequest) returns (InviteLinkReply);

  // Revoke an invite link
  rpc RevokeInviteLink(RevokeInviteLinkRequest) returns (utils.v1.EmptyReply);

  // Delete all revoked invite links
  rpc DeleteRevokedInviteLinks(EventRequest) returns (utils.v1.EmptyReply);

  // Get a list of invite links (active, revoked, expired)
  rpc ListInviteLinks(ListInviteLinksRequest) returns (ListInviteLinksReply);

  // Join an event using an invite link
  // Send a join request (for closed links with requiresApproval = true)
  rpc JoinWithInviteLink(JoinWithInviteLinkRequest) returns (MemberReply);

  // Accept or decline a join request
  rpc RespondToJoin(RespondToJoinRequest) returns (utils.v1.EmptyReply);

  // List pending join requests for an event
  rpc ListJoinRequests(ListJoinRequestsRequest) returns (ListJoinRequestsReply);
}

// ---------- Requests & Replies ----------

message CreateInviteLinkRequest {
  int64 eventId = 1;
  string title = 2; // optional, max 50 chars
  bool requiresApproval = 3;
  int32 expiryDays = 4; // 0, 1, 10, 100 (0 = no expiration)
  int32 maxUses = 5;    // 0, 1, 10, 100 (0 = unlimited)
}

message RevokeInviteLinkRequest {
  int64 inviteLinkId = 1;
}

message ListInviteLinksRequest {
  int64 eventId = 1;
  repeated string statuses = 2; // optional filter
  utils.v1.PaginateRequest paginate = 3;
}

message ListInviteLinksReply {
  repeated InviteLink links = 1;
  repeated iam.v1.UserShort users = 2;
}

message JoinWithInviteLinkRequest {
  string uuid = 1;
  optional int64 calendarId = 2;
}

message RespondToJoinRequest {
  int64 memberId = 1;
  string action = 2;
}

message ListJoinRequestsRequest {
  int64 eventId = 1;
  utils.v1.PaginateRequest paginate = 2;
}

message ListJoinRequestsReply {
  repeated Member members = 1;
  repeated iam.v1.UserShort users = 2;
}
