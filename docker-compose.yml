version: '3.5'

services:
  db:
    container_name: ${SERVICE_NAME}_db
    restart: always
    image: postgres:latest
    volumes:
      - ${DB_VOLUME}:/var/lib/postgresql/data
    ports:
      - '${DB_PORT}:5432'
    environment:
      - PGDATA=/var/lib/postgresql/data/pgdata
      - POSTGRES_DB=${DB_NAME}
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASS}
    networks:
      - backend
  service:
    image: ${REGISTRY_IMAGE}
    container_name: ${SERVICE_NAME}_service
    networks:
      - backend
    volumes:
      - ./configs:/data/conf
    restart: unless-stopped
    depends_on:
      - db
    profiles:
      - stage
    environment:
      - JWT_SECRET=${JWT_SECRET}
  dev-service:
    build:
      context: ./
      dockerfile: Dockerfile
    container_name: ${SERVICE_NAME}_service
    ports:
      - '${HTTP_PORT}:8000'
      - '${GRPC_PORT}:9000'
    networks:
      - backend
    volumes:
      - ./configs:/data/conf
    restart: unless-stopped
    depends_on:
      - db
    profiles:
      - dev
    environment:
      - JWT_SECRET=${JWT_SECRET}

volumes:
  dbvol:
    name: ${SERVICE_NAME}_db
    external: true

networks:
  backend:
    name: ${NETWORK}
    driver: bridge
    external: true
