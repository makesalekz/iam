stages:
  - build
  - deploy

include:
  - project: 'deploy/common-cicd'
    file: '/common-project.yml'
    ref: 'main'

docker-build:
  tags:
    - ${RUNNER_TAG}
  stage: build
  variables:
    SERVICE_NAME: ${CI_PROJECT_NAME}
    DB_PORT: 54400
    DB_NAME: api
    DB_USER: me
    DB_PASS: password
    DB_VOLUME: dbvol
    NETWORK: ${ENVIRONMENT_CODE}
    REGISTRY_IMAGE: ${CI_REGISTRY_IMAGE}:${CI_COMMIT_SHA}
  script:
    # build and push to registry
    - docker build ${DOCKER_BUILD_ARGS} -t ${CI_REGISTRY_IMAGE}:${CI_COMMIT_SHA} .
    - tag_sha_latest_and_push
    # set environment
    - export JWT_SECRET=$(docker exec vault vault kv get -mount=secret -field=data app/global/jwt)
    - docker compose down
    # database up
    - docker volume create ${CI_PROJECT_NAME}_db || true
    - docker compose up -d
    # migrations up
    - docker pull arigaio/atlas
    - docker run --rm -v $(pwd)/ent/migrate/migrations:/migrations --network ${NETWORK} arigaio/atlas migrate apply --url "postgres://me:password@${CI_PROJECT_NAME}_db:5432/api?search_path=public&sslmode=disable"
    # service up
    - docker compose --profile=${ENVIRONMENT_CODE} up -d
  after_script:
    - echo ${ENVIRONMENT_CODE} http://${CI_PROJECT_NAME}-${ENVIRONMENT_CODE}
