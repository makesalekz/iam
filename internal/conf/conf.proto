syntax = "proto3";
package kratos.api;

option go_package = "gitlab.calendaria.team/services/iam/internal/conf;conf";

import "google/protobuf/duration.proto";

message Bootstrap {
  Server server = 1;
  string db = 2;
  string nats = 3;
  Discovery discovery = 4;
}

message Server {
  message HTTP {
    string network = 1;
    string addr = 2;
    google.protobuf.Duration timeout = 3;
  }
  message GRPC {
    string network = 1;
    string addr = 2;
    google.protobuf.Duration timeout = 3;
  }
  HTTP http = 1;
  GRPC grpc = 2;
}

message Discovery {
  string notifications = 1;
  google.protobuf.Duration notifications_timeout = 2;
  string tenants = 3;
  google.protobuf.Duration tenants_timeout = 4;
  string contacts = 5;
  google.protobuf.Duration contacts_timeout = 6;
  string chats = 7;
  google.protobuf.Duration chats_timeout = 8;
  string events = 9;
  google.protobuf.Duration events_timeout = 10;
  string media = 11;
  google.protobuf.Duration media_timeout = 12;
  string websockets = 13;
  google.protobuf.Duration websockets_timeout = 14;
}